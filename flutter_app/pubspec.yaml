name: love4lili_flutter
description: "Love4Lili - 情侣约会记录与规划 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  file_picker: ^8.1.5

  # Utils
  intl: ^0.20.1
  permission_handler: ^11.3.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  json_serializable: ^6.8.0
  riverpod_lint: ^2.6.2

  # Integration Testing
  patrol: ^3.12.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
